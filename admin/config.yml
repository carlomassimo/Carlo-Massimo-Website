backend:
  name: git-gateway
  branch: main # Change this to 'master' if that is your GitHub branch name

media_folder: "images"
public_folder: "images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Engagements Page"
        name: "engagements"
        file: "engagements.html"
        fields:
          - {label: "Body content", name: "body", widget: "markdown"}
